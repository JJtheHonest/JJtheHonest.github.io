<head>
  <title>
    {% if page.title == "About Me" %}
      {{ site.title }} | {{ site.description }}
    {% else %}
      {{ page.title }} | {{ site.title }}
    {% endif %}
  </title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <link rel="stylesheet" href="{{ site.github.url }}/assets/css/main.css">
  <link rel="stylesheet" href="{{ site.github.url }}/assets/css/syntax.css">
  {% feed_meta %}
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Serif:400,400italic,700%7CPT+Sans:400">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Code+Pro">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Quattrocento+Sans">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script type="text/javascript" async
    src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML">
    MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$', '$'], ['\\(', '\\)']]
        }
      });
  </script>
  {% include google-analytics.html %}
  {% seo %}
  <style>
    body.dark-mode {
      background: #1a1a1a;
      color: #ccc;
    }
    body.dark-mode a,
    body.dark-mode .header-title a,
    body.dark-mode .pagination-active {
      color: #80b6f4;
    }
    body.dark-mode h1, body.dark-mode h2, body.dark-mode h3,
    body.dark-mode h4, body.dark-mode h5, body.dark-mode h6,
    body.dark-mode .footer a:hover {
      color: #e0e0e0;
    }
    body.dark-mode .header-subtitle,
    body.dark-mode .menu-content a,
    body.dark-mode .social-icons a,
    body.dark-mode .post-date,
    body.dark-mode .footer,
    body.dark-mode .footer a,
    body.dark-mode .footer-description {
      color: #888;
    }
    body.dark-mode .footer-description a {
      color: #888;
    }
    body.dark-mode blockquote {
      background: #2a2a2a;
      border-left-color: #64b5f6;
      color: #ccc;
    }
    body.dark-mode code {
      background-color: #333;
    }
    body.dark-mode pre,
    body.dark-mode .highlight {
      background-color: #2a2a2a;
    }
    body.dark-mode table, body.dark-mode th, body.dark-mode td {
      border-color: #444;
    }
    body.dark-mode h2 {
      border-bottom-color: #333;
    }
    body.dark-mode .pub-tag {
      background: #1a3a5c;
      color: #90caf9;
    }
    body.dark-mode .pub-venue,
    body.dark-mode .section-link,
    body.dark-mode .section-link a {
      color: #999;
    }
    body.dark-mode .pagination-button {
      border-color: #444;
      color: #888;
    }
    body.dark-mode .pagination-button:hover {
      background-color: #333;
    }
    body.dark-mode hr {
      border-top-color: #333;
    }
    body.dark-mode .dark-toggle {
      color: #888;
    }
    body.dark-mode .dark-toggle:hover {
      color: #e0e0e0;
    }
  </style>
</head>
