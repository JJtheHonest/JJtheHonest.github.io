<!doctype html>
<html>
  {% include head.html %}
  <body>
    <div class="container">
      {% include header.html %}
      <div class="content-container">
        {{ content }}
      </div>
      {% include footer.html %}
    </div>
    <script>
      (function() {
        var moonSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
        var sunSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
        var toggle = document.getElementById('darkToggle');
        var body = document.body;
        var stored = localStorage.getItem('darkMode');
        if (stored !== 'false') {
          body.classList.add('dark-mode');
          if (toggle) { document.getElementById('darkIcon').innerHTML = sunSvg; document.getElementById('darkLabel').textContent = 'Innie'; }
        }
        if (toggle) {
          toggle.addEventListener('click', function() {
            body.classList.toggle('dark-mode');
            var isDark = body.classList.contains('dark-mode');
            document.getElementById('darkIcon').innerHTML = isDark ? sunSvg : moonSvg;
            document.getElementById('darkLabel').textContent = isDark ? 'Innie' : 'Outie';
            localStorage.setItem('darkMode', isDark);
          });
        }
      })();
    </script>
  </body>
</html>
